name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web-dashboard/package-lock.json
    - name: Install dependencies
      working-directory: web-dashboard
      run: npm ci
    - name: Build Web Dashboard
      working-directory: web-dashboard
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://mock.supabase.co' }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'mock-key' }}
      run: npm run build
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: web-build
        path: web-dashboard/.next/

  execute-tests:
    name: Execute E2E Tests
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test_type: [web_selenium, mobile_appium, api, validation, performance]
      fail-fast: false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install -r qa-automation/requirements.txt
        
    - name: Run Pytest Suites
      if: matrix.test_type != 'performance'
      env:
        PYTHONPATH: .
      run: |
        pytest qa-automation/tests/test_${{ matrix.test_type }}.py \
          --html=reports/${{ matrix.test_type }}-report.html \
          --alluredir=reports/allure-results
          
    - name: Run Locust Performance Tests
      if: matrix.test_type == 'performance'
      env:
        PYTHONPATH: .
      run: |
        # In a real environment we'd extract specific perf rows, here we do a blanket run
        locust -f qa-automation/performance/locustfile.py --headless -u 10 -r 2 -t 10s --html reports/performance-report.html || true
        
    - name: Upload Partial Excel Result
      uses: actions/upload-artifact@v4
      with:
        name: excel-result-${{ matrix.test_type }}
        path: qa-automation/QA_Test_Suite.xlsx

    - name: Upload HTML Reports
      uses: actions/upload-artifact@v4
      with:
        name: html-reports-${{ matrix.test_type }}
        path: reports/

  aggregate-reports:
    name: Aggregate Test Reports
    needs: execute-tests
    runs-on: ubuntu-latest
    if: always()
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install pandas openpyxl
      
    # Note: In a real scenario with matrix jobs mutating the same Excel file,
    # we would download all `excel-result-*` artifacts and run a merge script.
    # For this framework, we assume the merge step here.
    - name: Download All Excel Results
      uses: actions/download-artifact@v4
      with:
        pattern: excel-result-*
        merge-multiple: true
        path: qa-automation/
        
    - name: Generate Master Report
      run: python qa-automation/core/generate_master_report.py || true
      
    - name: Upload Final Consolidated Report
      uses: actions/upload-artifact@v4
      with:
        name: Final-QA-Test-Suite
        path: qa-automation/QA_Test_Suite.xlsx

  deploy:
    name: Deploy to Production
    needs: aggregate-reports
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: web-build
        path: web-dashboard/.next/
    - name: Mock Deployment Step
      run: |
        echo "Deploying to production server..."
        echo "Deployment successful."
