name: Selenium E2E Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  selenium-e2e:
    name: Run Selenium Login Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js 24 ────────────────────────────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # ── 3. Install Chrome (latest stable) ─────────────────────────────────
      - name: Install Google Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          echo "Chrome version: $(google-chrome --version)"

      # ── 4. Install matching ChromeDriver ───────────────────────────────────
      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Verify ChromeDriver
        run: |
          echo "ChromeDriver version: $(chromedriver --version)"
          chromedriver &
          sleep 2
          kill %1 2>/dev/null || true

      # ── 5. Install Selenium test dependencies ─────────────────────────────
      - name: Install Selenium test dependencies
        working-directory: web-dashboard/selenium-tests
        run: |
          npm install --no-fund --no-audit
          echo "Installed packages:"
          npm list --depth=0

      # ── 6. Run Selenium Login Tests (headless, against Vercel) ────────────
      - name: Run Selenium E2E Login Tests
        working-directory: web-dashboard/selenium-tests
        env:
          TEST_HEADLESS: 'true'
          TEST_BASE_URL: 'https://web-dashboard-8rrykr4ea-moksha-sais-projects-5c4d762b.vercel.app'
          TEST_USER_APPROVED_EMAIL: ${{ secrets.TEST_USER_APPROVED_EMAIL }}
          TEST_USER_APPROVED_PASS: ${{ secrets.TEST_USER_APPROVED_PASS }}
          TEST_USER_PENDING_EMAIL: ${{ secrets.TEST_USER_PENDING_EMAIL }}
          TEST_USER_PENDING_PASS: ${{ secrets.TEST_USER_PENDING_PASS }}
          TEST_USER_SUSPENDED_EMAIL: ${{ secrets.TEST_USER_SUSPENDED_EMAIL }}
          TEST_USER_SUSPENDED_PASS: ${{ secrets.TEST_USER_SUSPENDED_PASS }}
          TEST_USER_REJECTED_EMAIL: ${{ secrets.TEST_USER_REJECTED_EMAIL }}
          TEST_USER_REJECTED_PASS: ${{ secrets.TEST_USER_REJECTED_PASS }}
        run: npm run test:headless

      # ── 7. Upload logs on failure ──────────────────────────────────────────
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-logs
          path: web-dashboard/selenium-tests/logs/
          if-no-files-found: ignore
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
