name: Selenium E2E Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Apply to ALL steps including actions/checkout
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  selenium-e2e:
    name: Run Selenium Login Tests
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js 24 ────────────────────────────────────────────────
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # ── 3. Build & Start Next.js App Locally ──────────────────────────────
      - name: Install web-dashboard dependencies
        working-directory: web-dashboard
        run: npm ci

      - name: Build Next.js app
        working-directory: web-dashboard
        env:
          # Required for Next.js build / runtime
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://zvraaxqalrgfstubdmjz.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2cmFheHFhbHJnZnN0dWJkbWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MTQ5MjMsImV4cCI6MjA5NDQ5MDkyM30.LkaEdOJmuaeORXXr3Mr-AXaKDsDll5BurFxP7HUdt6E' }}
        run: npm run build

      - name: Start Next.js app
        working-directory: web-dashboard
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://zvraaxqalrgfstubdmjz.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp2cmFheHFhbHJnZnN0dWJkbWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MTQ5MjMsImV4cCI6MjA5NDQ5MDkyM30.LkaEdOJmuaeORXXr3Mr-AXaKDsDll5BurFxP7HUdt6E' }}
        # Start server in background
        run: npm run start &

      - name: Wait for Next.js to be ready
        run: npx wait-on http://127.0.0.1:3000 --timeout 30000

      # ── 4. Install Selenium test dependencies ─────────────────────────────
      - name: Install Selenium test dependencies
        working-directory: web-dashboard/selenium-tests
        run: npm ci

      # ── 5. Run Login E2E Tests (headless) ─────────────────────────────────
      - name: Run Selenium E2E Login Tests
        working-directory: web-dashboard/selenium-tests
        env:
          TEST_HEADLESS: 'true'
          # Test against localhost instead of Vercel!
          TEST_BASE_URL: 'http://127.0.0.1:3000'
          TEST_USER_APPROVED_EMAIL: ${{ secrets.TEST_USER_APPROVED_EMAIL }}
          TEST_USER_APPROVED_PASS: ${{ secrets.TEST_USER_APPROVED_PASS }}
          TEST_USER_PENDING_EMAIL: ${{ secrets.TEST_USER_PENDING_EMAIL }}
          TEST_USER_PENDING_PASS: ${{ secrets.TEST_USER_PENDING_PASS }}
          TEST_USER_SUSPENDED_EMAIL: ${{ secrets.TEST_USER_SUSPENDED_EMAIL }}
          TEST_USER_SUSPENDED_PASS: ${{ secrets.TEST_USER_SUSPENDED_PASS }}
          TEST_USER_REJECTED_EMAIL: ${{ secrets.TEST_USER_REJECTED_EMAIL }}
          TEST_USER_REJECTED_PASS: ${{ secrets.TEST_USER_REJECTED_PASS }}
        run: npm run test:login:headless

      # ── 6. Upload logs on failure ──────────────────────────────────────────
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-failure-logs
          path: web-dashboard/selenium-tests/logs/
          if-no-files-found: ignore
